name: Daily WNBA CBA Quiz

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  send-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily quiz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          pip install anthropic --quiet
          python3 << 'PYEOF'
          import anthropic, smtplib, os, json, base64
          from datetime import datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders

          CBA_B64 = ""
          CBA_REF = base64.b64decode(CBA_B64).decode('utf-8')

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          prompt = """You are generating a daily quiz for a WNBA front office professional based ONLY on the 2026-2033 WNBA CBA provided below.

QUESTION DISTRIBUTION (exactly):
- Article V (Standard Player Contract): 3 questions — salary structures, protection types, contract rules, PDCs, supermax/standard max thresholds, pregnancy disability
- Article VI (Free Agency): 2 questions — Core Players, Reserved Players, Restricted/Unrestricted FA, qualifying offers, offer sheets, moratorium
- Article VII (Salary Cap): 2 questions — cap exceptions, team salary calculation, trade rules, extensions, guarantee payments, minimum team salary
- Article X (Benefits): 1 question — health insurance, childcare, family planning, 401k, parental leave, mental health
- Article XIV (Player Conduct): 1 question — fines, suspensions, holdouts, WNBA prioritization, gambling, firearms
- One rotating question from: Art I (definitions), Art VIII (rookie scale), Art IX (merit bonuses), Art XIII (draft/eligibility), Art XV (circumvention), Art XX (medical), Art XXXIII (expansion)

FORMAT: exactly 8 multiple choice + 2 true/false, mixed throughout (not all at end).
DIFFICULTY: Advanced. Assume deep familiarity with the prior CBA. Focus on specific dollar figures, thresholds, timeframes, and what CHANGED in 2026. Every question must cite a specific article and section.

CBA REFERENCE TEXT (2026-2033):
""" + CBA_REF + """

Return ONLY a valid JSON array of exactly 10 objects. No markdown fences, no preamble, no explanation.
Each object must have exactly these keys:
{
  "question": "string",
  "type": "multiple_choice" or "true_false",
  "options": ["A text", "B text", "C text", "D text"],
  "correct_answer": "A" or "B" or "C" or "D",
  "explanation": "1-3 sentences citing the specific 2026-2033 CBA article and section number",
  "article": "e.g. Art. V §7(a)"
}
For true_false: omit options array, correct_answer is "A" for True or "B" for False."""

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=4000,
              system="You are a precise WNBA CBA quiz generator. Output ONLY a valid JSON array. No markdown fences, no preamble, no explanation. Just the raw JSON array starting with [ and ending with ].",
              messages=[{"role": "user", "content": prompt}]
          )

          raw = message.content[0].text.strip()
          raw = raw.replace("```json", "").replace("```", "").strip()
          if not raw:
              raise ValueError("Empty response from API")
          questions = json.loads(raw)

          date_str = datetime.now().strftime("%A, %B %-d, %Y")

          def build_html(questions, date_str):
              blocks = ""
              for i, q in enumerate(questions):
                  is_tf = q["type"] == "true_false"
                  opts = [("A", "True"), ("B", "False")] if is_tf else [(chr(65+j), o) for j, o in enumerate(q.get("options", []))]
                  opts_html = "".join(
                      f'<div class="opt" data-val="{l}" onclick="pick(this,{i})"><span class="opt-letter">{l}</span><span class="opt-text">{t}</span></div>'
                      for l, t in opts
                  )
                  blocks += f'''
                  <div class="q-card" id="qc{i}">
                    <div class="q-meta">
                      <span class="q-num">Q{i+1}</span>
                      <span class="q-article">{q.get("article","")}</span>
                      <span class="q-type">{"T / F" if is_tf else "4-choice"}</span>
                    </div>
                    <div class="q-text">{q["question"]}</div>
                    <div class="options">{opts_html}</div>
                    <div class="explanation" id="exp{i}">
                      <div class="exp-label">CBA Reference</div>
                      <div class="exp-text">{q["explanation"]}</div>
                    </div>
                  </div>'''

              answers_json = json.dumps([q["correct_answer"] for q in questions])

              return f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>WNBA CBA Quiz — {date_str}</title>
          <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
          <style>
          *{{box-sizing:border-box;margin:0;padding:0}}
          body{{font-family:"DM Sans",-apple-system,sans-serif;background:#f5f5f5;color:#111;padding-bottom:60px}}
          .header{{background:#000;padding:28px 20px 0}}
          .header-top{{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}}
          .header-title{{font-family:"DM Serif Display",serif;font-size:30px;color:#fff;line-height:1.1}}
          .header-title span{{color:#c8102e}}
          .header-sub{{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#ff0099;margin-bottom:6px}}
          .header-date{{font-size:11px;color:#555;text-align:right;padding-top:4px}}
          .scorebar{{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#222;overflow:hidden}}
          .score-cell{{background:#111;padding:12px;text-align:center}}
          .score-num{{font-size:22px;font-weight:700;color:#fff;line-height:1}}
          .score-num.hi{{color:#ff0099}}
          .score-label{{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:3px}}
          .container{{padding:16px;max-width:600px;margin:0 auto}}
          .q-card{{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:18px;margin-bottom:12px}}
          .q-meta{{display:flex;align-items:center;gap:7px;margin-bottom:12px}}
          .q-num{{background:#c8102e;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}}
          .q-article{{background:#f5f5f5;color:#555;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid #e8e8e8}}
          .q-type{{margin-left:auto;font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.5px}}
          .q-text{{font-size:15px;line-height:1.55;color:#111;font-weight:500;margin-bottom:14px}}
          .options{{display:flex;flex-direction:column;gap:7px}}
          .opt{{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border:1px solid #e8e8e8;border-radius:8px;cursor:pointer;background:#fafafa;transition:all 0.1s;-webkit-tap-highlight-color:transparent}}
          .opt:hover{{border-color:#c8102e;background:#fff8f8}}
          .opt.correct{{border-color:#273103;background:#f5f7f0;cursor:default}}
          .opt.incorrect{{border-color:#ffd0d0;background:#fff5f5;cursor:default}}
          .opt.show-correct{{border-color:#273103;background:#f5f7f0;cursor:default}}
          .opt.locked{{cursor:default}}
          .opt-letter{{font-size:11px;font-weight:700;color:#bbb;min-width:14px;padding-top:1px;flex-shrink:0}}
          .opt.correct .opt-letter{{color:#273103}}
          .opt.incorrect .opt-letter{{color:#c8102e}}
          .opt.show-correct .opt-letter{{color:#273103}}
          .opt-text{{font-size:14px;line-height:1.45;color:#333}}
          .opt.correct .opt-text{{color:#273103;font-weight:600}}
          .opt.incorrect .opt-text{{color:#c8102e;text-decoration:line-through}}
          .opt.show-correct .opt-text{{color:#273103;font-weight:600}}
          .explanation{{display:none;margin-top:12px;padding:12px 14px;background:#f9f9f0;border-left:3px solid #273103;border-radius:0 7px 7px 0}}
          .explanation.show{{display:block}}
          .exp-label{{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#273103;margin-bottom:5px}}
          .exp-text{{font-size:13px;line-height:1.65;color:#444}}
          .finish-btn-wrap{{display:none;padding:4px 0 8px}}
          .finish-btn-wrap.show{{display:block}}
          .finish-btn{{width:100%;padding:18px;background:#000;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:"DM Sans",sans-serif;cursor:pointer}}
          .result-card{{display:none;background:#000;border-radius:12px;padding:32px 24px;text-align:center;margin-top:4px}}
          .result-card.show{{display:block}}
          .result-score{{font-family:"DM Serif Display",serif;font-size:64px;color:#fff;line-height:1}}
          .result-score span{{color:#ff0099}}
          .result-msg{{font-size:15px;color:#888;margin-top:12px;line-height:1.5}}
          </style>
          </head>
          <body>
          <div class="header">
            <div class="header-top">
              <div><div class="header-sub">Daily training</div><div class="header-title">WNBA <span>CBA</span> Quiz</div></div>
              <div class="header-date">{date_str}</div>
            </div>
            <div class="scorebar">
              <div class="score-cell"><div class="score-num hi" id="sc">0</div><div class="score-label">Correct</div></div>
              <div class="score-cell"><div class="score-num" id="sa">0</div><div class="score-label">Done</div></div>
              <div class="score-cell"><div class="score-num" id="sl">10</div><div class="score-label">Left</div></div>
            </div>
          </div>
          <div class="container">
          {blocks}
          <div class="finish-btn-wrap" id="fb"><button class="finish-btn" onclick="finish()">See My Score</button></div>
          <div class="result-card" id="rc"><div class="result-score" id="rs"></div><div class="result-msg" id="rm"></div></div>
          </div>
          <script>
          const A={answers_json},T=10;let done=new Set(),cc=0;
          function pick(el,i){{if(done.has(i))return;done.add(i);const c=el.dataset.val,r=A[i];document.getElementById("qc"+i).querySelectorAll(".opt").forEach(o=>{{o.onclick=null;o.classList.add("locked");if(o.dataset.val===r)o.classList.add(c===r?"correct":"show-correct")}});if(c===r){{el.classList.add("correct");cc++;}}else el.classList.add("incorrect");document.getElementById("exp"+i).classList.add("show");document.getElementById("sc").textContent=cc;document.getElementById("sa").textContent=done.size;document.getElementById("sl").textContent=T-done.size;if(done.size===T){{const f=document.getElementById("fb");f.classList.add("show");setTimeout(()=>f.scrollIntoView({{behavior:"smooth",block:"nearest"}}),300);}}}}
          function finish(){{const p=Math.round(cc/T*100),m=[[100,"Perfect. You know this CBA cold."],[90,"Excellent — nearly flawless."],[80,"Strong. A few edges to sharpen."],[70,"Solid. Review what you missed."],[60,"Getting there — keep grinding."],[0,"Use the explanations to level up."]].find(x=>p>=x[0])[1];document.getElementById("rs").innerHTML=cc+"<span>/"+T+"</span>";document.getElementById("rm").textContent=m;document.getElementById("rc").classList.add("show");document.getElementById("fb").classList.remove("show");setTimeout(()=>document.getElementById("rc").scrollIntoView({{behavior:"smooth"}}),100);}}
          </script>
          </body>
          </html>"""

          html = build_html(questions, date_str)

          # Save as temp file
          quiz_filename = f"wnba_cba_quiz_{datetime.now().strftime('%Y-%m-%d')}.html"
          with open(f"/tmp/{quiz_filename}", "w") as f:
              f.write(html)

          # Build email with HTML attachment
          msg = MIMEMultipart()
          msg["Subject"] = f"WNBA CBA Quiz — {date_str}"
          msg["From"] = os.environ["GMAIL_ADDRESS"]
          msg["To"] = "benpickman@yahoo.com"

          # Simple plain text body
          body_text = f"""Your WNBA CBA Daily Quiz for {date_str} is attached.

Open the attached HTML file in your browser (Safari or Chrome) to take the quiz.
Tap an answer to reveal whether it is correct, and see the CBA reference.

Good luck!"""

          msg.attach(MIMEText(body_text, "plain"))

          # Attach the HTML quiz file
          with open(f"/tmp/{quiz_filename}", "rb") as f:
              part = MIMEBase("application", "octet-stream")
              part.set_payload(f.read())
          encoders.encode_base64(part)
          part.add_header("Content-Disposition", f"attachment; filename={quiz_filename}")
          msg.attach(part)

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_ADDRESS"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)

          print(f"Quiz sent successfully! {len(questions)} questions generated.")
          PYEOF
