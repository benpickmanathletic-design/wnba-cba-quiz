name: Daily WNBA CBA Quiz

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  send-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch CBA reference and question log from main
        run: |
          git fetch origin main
          git checkout origin/main -- cba_reference.txt || echo "No CBA file yet"
          git checkout origin/main -- asked_questions.json || echo "[]" > asked_questions.json

      - name: Install dependencies
        run: pip install anthropic --quiet

      - name: Generate and deploy quiz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import anthropic, smtplib, os, json, base64
          from datetime import datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          # Load CBA reference
          with open("cba_reference.txt") as f:
              CBA_REF = base64.b64decode(f.read().strip()).decode("utf-8")

          # Load question history
          try:
              with open("asked_questions.json") as f:
                  asked = json.load(f)
          except:
              asked = []

          # Keep last 60 questions for context
          recent_questions = asked[-60:] if len(asked) > 60 else asked
          history_str = ""
          if recent_questions:
              history_str = "\n\nDO NOT repeat or closely paraphrase any of these recently asked questions:\n" + "\n".join(f"- {q}" for q in recent_questions)

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          prompt = ("You are generating a daily quiz for a WNBA front office professional "
              "based ONLY on the 2026-2033 WNBA CBA provided below.\n\n"
              "QUESTION DISTRIBUTION: Art V (3 questions), Art VI (2), Art VII (2), "
              "Art X (1), Art XIV (1), one rotating from Arts I/VIII/IX/XI/XII/XIII/XV/XX/XXXIII/XXXIV.\n"
              "FORMAT: 8 multiple choice + 2 true/false mixed throughout.\n"
              "DIFFICULTY: Advanced. Specific dollar figures, thresholds, edge cases, "
              "what CHANGED in 2026. Every question must cite a specific article and section.\n"
              + history_str +
              "\n\nCBA REFERENCE TEXT (2026-2033):\n" + CBA_REF +
              "\n\nReturn ONLY a valid JSON array of exactly 10 objects. No markdown. "
              "Each: question, type (multiple_choice or true_false), "
              "options (4-item array for MC only), correct_answer (A/B/C/D), "
              "explanation (1-3 sentences with article+section), article (e.g. Art. V s7a)")

          msg_resp = client.messages.create(
              model="claude-sonnet-4-6", max_tokens=4000,
              system="Output ONLY a valid JSON array. No markdown, no preamble.",
              messages=[{"role": "user", "content": prompt}])

          raw = msg_resp.content[0].text.strip().replace("```json","").replace("```","").strip()
          questions = json.loads(raw)
          date_str = datetime.now().strftime("%A, %B %-d, %Y")

          # Update question log
          new_questions = [q["question"] for q in questions]
          asked.extend(new_questions)
          with open("asked_questions.json", "w") as f:
              json.dump(asked, f, indent=2)

          # Build HTML
          blocks = ""
          for i, q in enumerate(questions):
              is_tf = q["type"] == "true_false"
              opts = [("A","True"),("B","False")] if is_tf else [(chr(65+j),o) for j,o in enumerate(q.get("options",[]))]
              oh = "".join(f'<div class="opt" data-val="{l}" onclick="pick(this,{i})"><span class="ol">{l}</span><span class="ot">{t}</span></div>' for l,t in opts)
              blocks += (f'<div class="qc" id="qc{i}"><div class="qm">'
                  f'<span class="qn">Q{i+1}</span><span class="qa">{q.get("article","")}</span>'
                  f'<span class="qt">{"T/F" if is_tf else "4-choice"}</span></div>'
                  f'<div class="qtx">{q["question"]}</div><div class="opts">{oh}</div>'
                  f'<div class="exp" id="exp{i}"><div class="el">CBA Reference</div>{q["explanation"]}</div></div>')

          ans = json.dumps([q["correct_answer"] for q in questions])
          html = ('<!DOCTYPE html><html><head><meta charset=UTF-8>'
              '<meta name=viewport content="width=device-width,initial-scale=1">'
              f'<title>WNBA CBA Quiz - {date_str}</title>'
              '<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel=stylesheet>'
              '<style>*{box-sizing:border-box;margin:0;padding:0}'
              'body{font-family:"DM Sans",-apple-system,sans-serif;background:#f5f5f5;color:#111;padding-bottom:60px}'
              '.hdr{background:#000;padding:28px 20px 0}.ht{display:flex;justify-content:space-between;margin-bottom:20px}'
              '.htl{font-family:"DM Serif Display",serif;font-size:30px;color:#fff}.htl span{color:#c8102e}'
              '.hts{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#ff0099;margin-bottom:6px}'
              '.hd{font-size:11px;color:#555;text-align:right;padding-top:4px}'
              '.sb{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#222;overflow:hidden}'
              '.sc{background:#111;padding:12px;text-align:center}.sn{font-size:22px;font-weight:700;color:#fff}'
              '.sn.hi{color:#ff0099}.sl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:3px}'
              '.wrap{padding:16px;max-width:600px;margin:0 auto}'
              '.qc{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:18px;margin-bottom:12px}'
              '.qm{display:flex;align-items:center;gap:7px;margin-bottom:12px}'
              '.qn{background:#c8102e;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}'
              '.qa{background:#f5f5f5;color:#555;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid #e8e8e8}'
              '.qt{margin-left:auto;font-size:10px;color:#bbb;text-transform:uppercase}'
              '.qtx{font-size:15px;line-height:1.55;color:#111;font-weight:500;margin-bottom:14px}'
              '.opts{display:flex;flex-direction:column;gap:7px}'
              '.opt{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border:1px solid #e8e8e8;border-radius:8px;cursor:pointer;background:#fafafa;transition:all 0.1s}'
              '.opt:hover{border-color:#c8102e;background:#fff8f8}'
              '.opt.cor{border-color:#273103;background:#f5f7f0;cursor:default}'
              '.opt.inc{border-color:#ffd0d0;background:#fff5f5;cursor:default}'
              '.opt.shc{border-color:#273103;background:#f5f7f0;cursor:default}'
              '.ol{font-size:11px;font-weight:700;color:#bbb;min-width:14px;padding-top:1px;flex-shrink:0}'
              '.opt.cor .ol{color:#273103}.opt.inc .ol{color:#c8102e}.opt.shc .ol{color:#273103}'
              '.ot{font-size:14px;line-height:1.45;color:#333}'
              '.opt.cor .ot{color:#273103;font-weight:600}.opt.inc .ot{color:#c8102e;text-decoration:line-through}.opt.shc .ot{color:#273103;font-weight:600}'
              '.exp{display:none;margin-top:12px;padding:12px 14px;background:#f9f9f0;border-left:3px solid #273103;border-radius:0 7px 7px 0;font-size:13px;line-height:1.65;color:#444}'
              '.exp.show{display:block}.el{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#273103;margin-bottom:5px}'
              '.fb{display:none;padding:4px 0 8px}.fb.show{display:block}'
              '.fb button{width:100%;padding:18px;background:#000;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}'
              '.rc{display:none;background:#000;border-radius:12px;padding:32px 24px;text-align:center;margin-top:4px}.rc.show{display:block}'
              '.rs{font-family:"DM Serif Display",serif;font-size:64px;color:#fff;line-height:1}.rs span{color:#ff0099}'
              '.rm{font-size:15px;color:#888;margin-top:12px}</style></head><body>'
              '<div class=hdr><div class=ht><div>'
              f'<div class=hts>Daily training</div><div class=htl>WNBA <span>CBA</span> Quiz</div></div>'
              f'<div class=hd>{date_str}</div></div>'
              '<div class=sb><div class=sc><div class="sn hi" id=sc>0</div><div class=sl>Correct</div></div>'
              '<div class=sc><div class=sn id=sa>0</div><div class=sl>Done</div></div>'
              '<div class=sc><div class=sn id=sl>10</div><div class=sl>Left</div></div></div></div>'
              f'<div class=wrap>{blocks}'
              '<div class="fb" id=fb><button onclick=finish()>See My Score</button></div>'
              '<div class="rc" id=rc><div class=rs id=rs></div><div class=rm id=rm></div></div></div>'
              f'<script>const A={ans},T=10;let d=new Set(),cc=0;'
              'function pick(el,i){if(d.has(i))return;d.add(i);const c=el.dataset.val,r=A[i];'
              'document.getElementById("qc"+i).querySelectorAll(".opt").forEach(o=>{o.onclick=null;'
              'if(o.dataset.val===r)o.classList.add(c===r?"cor":"shc")});'
              'if(c===r){el.classList.add("cor");cc++;}else el.classList.add("inc");'
              'document.getElementById("exp"+i).classList.add("show");'
              'document.getElementById("sc").textContent=cc;document.getElementById("sa").textContent=d.size;'
              'document.getElementById("sl").textContent=T-d.size;'
              'if(d.size===T){const f=document.getElementById("fb");f.classList.add("show");'
              'setTimeout(()=>f.scrollIntoView({behavior:"smooth",block:"nearest"}),300);}}'
              'function finish(){const p=Math.round(cc/T*100),'
              'm=[[100,"Perfect. You know this CBA cold."],[90,"Excellent — nearly flawless."],'
              '[80,"Strong. A few edges to sharpen."],[70,"Solid. Review what you missed."],'
              '[60,"Getting there — keep grinding."],[0,"Use the explanations to level up."]].find(x=>p>=x[0])[1];'
              'document.getElementById("rs").innerHTML=cc+"<span>/"+T+"</span>";'
              'document.getElementById("rm").textContent=m;'
              'document.getElementById("rc").classList.add("show");'
              'document.getElementById("fb").classList.remove("show");'
              'setTimeout(()=>document.getElementById("rc").scrollIntoView({behavior:"smooth"}),100);}'
              '</script></body></html>')

          with open("index.html", "w") as f:
              f.write(html)
          print(f"Quiz HTML written. {len(questions)} questions.")

          # Send email
          msg = MIMEMultipart()
          msg["Subject"] = f"WNBA CBA Quiz - {date_str}"
          msg["From"] = os.environ["GMAIL_ADDRESS"]
          msg["To"] = "benpickman@yahoo.com"
          msg.attach(MIMEText(
              f"Your WNBA CBA Quiz for {date_str} is ready.\n\n"
              "Tap to open:\nhttps://benpickmanathletic-design.github.io/wnba-cba-quiz/\n\nGood luck!",
              "plain"))
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_ADDRESS"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)
          print("Email sent!")
          EOF

      - name: Commit quiz and question log to gh-pages
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html asked_questions.json
          git commit -m "Daily quiz $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push origin gh-pages

      - name: Push question log back to main
        run: |
          git fetch origin main
          git checkout origin/main -b main-temp
          cp asked_questions.json /tmp/asked_questions.json
          git checkout gh-pages
          git checkout main-temp
          cp /tmp/asked_questions.json asked_questions.json
          git add asked_questions.json
          git commit -m "Update question log $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push origin HEAD:main
